# Zoea Merchant Web — production (e.g. /opt/zoea-merchant on server).
# Host MERCHANT_PORT (default 3016) → container 3000.

services:
  zoea-merchant:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://zoea-africa.qtsoftwareltd.com/api}
    container_name: zoea-merchant
    restart: unless-stopped
    ports:
      - "${MERCHANT_PORT:-3016}:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://zoea-africa.qtsoftwareltd.com/api}
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3000/api/health', (r) => { process.exit(r.statusCode === 200 ? 0 : 1); }).on('error', () => process.exit(1));",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 50s
