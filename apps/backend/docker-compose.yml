version: '3.8'

services:
  api:
    image: zoea-api:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zoea-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - PORT=3000
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:3000,http://localhost:3001,http://127.0.0.1:3001,http://209.74.80.195:3015,https://admin.zoea.africa,http://admin.zoea.africa}
    networks:
      - zoea-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/docs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  zoea-network:
    driver: bridge

