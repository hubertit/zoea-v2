# Zoea Admin — production stack (e.g. /opt/zoea-admin on server).
# Host port 3015 → container port 3000 (Next standalone).
#
# Copy .env.example to .env and set NEXT_PUBLIC_API_URL before:
#   docker compose up -d --build

services:
  zoea-admin:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://zoea-africa.qtsoftwareltd.com/api}
    container_name: zoea-admin
    restart: unless-stopped
    ports:
      - "3015:3000"
    environment:
      NODE_ENV: production
      # Client bundle is baked at build; this can help runtime/server if extended later
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://zoea-africa.qtsoftwareltd.com/api}
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3000/api/health', (r) => { process.exit(r.statusCode === 200 ? 0 : 1); }).on('error', () => process.exit(1));",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 50s
